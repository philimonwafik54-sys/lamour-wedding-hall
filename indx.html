<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قاعة Lamour - نادي شدوان</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* تم وضع رابط صورتك هنا */
            background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('https://i.ibb.co/G477YBDL/image.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .main-card {
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            margin: 20px;
            border-radius: 25px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
        }

        h1 { font-size: 32px; margin-bottom: 5px; color: #f1c40f; }
        p { font-size: 18px; opacity: 0.9; }

        .btn-call {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 18px 35px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            margin: 25px 0;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-call:hover { 
            background: #128c7e; 
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        .map-section {
            margin-top: 20px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #f1c40f;
            line-height: 0;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>قاعة Lamour</h1>
        <p>نادي شدوان الرياضي - الغردقة</p>
        
        <a href="tel:01011173322" class="btn-call">
            📞 اتصل بنا: 01011173322
        </a>

        <div class="map-section">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3549.032131924619!2d33.8242557!3d27.2494954!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x145387527ee0b163%3A0x38bcbecc9ee90ed6!2z2YbYp9iv2Ykg2LTYr9mI2KfZhiDYp9mE2LHZitin2LbZig!5e0!3m2!1sar!2seg!4v1715420000000!5m2!1sar!2seg" 
                width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>
    </div>

</body>
</html>
